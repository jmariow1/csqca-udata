name: Gerar Executaveis (Win, Lin, Mac)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# Esta linha resolve o alerta do GitHub forçando o uso do Node 24 moderno
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ==========================================
  # 1. COMPILADOR WINDOWS (.exe)
  # ==========================================
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Preparar Python
      uses: actions/setup-python@v5 # Atualizado para v5
      with:
        python-version: '3.10'
    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install pandas matplotlib matplotlib-venn openpyxl pyinstaller sympy
    - name: Compilar com PyInstaller (Windows)
      run: |
        pyinstaller --noconsole --onefile --name "csQCA_UData" --icon=1000068048.ico --add-data "1000068048.ico;." app.py
    - name: Disponibilizar Executável Windows
      uses: actions/upload-artifact@v4
      with:
        name: csQCA-UData-Windows-EXE
        path: dist/csQCA_UData.exe

  # ==========================================
  # 2. COMPILADOR LINUX (.deb)
  # ==========================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Preparar Python
      uses: actions/setup-python@v5 # Atualizado para v5
      with:
        python-version: '3.10'
    - name: Instalar Dependências e Ferramentas
      run: |
        python -m pip install --upgrade pip
        pip install pandas matplotlib matplotlib-venn openpyxl pyinstaller sympy
        sudo apt-get update
        sudo apt-get install -y imagemagick
    - name: Compilar com PyInstaller (Linux)
      run: |
        pyinstaller --noconsole --onefile --name "csqca-udata" --add-data "1000068048.ico:." app.py
    - name: Empacotar para .DEB
      run: |
        mkdir -p build_deb/csqca-udata_1.0_amd64/DEBIAN
        mkdir -p build_deb/csqca-udata_1.0_amd64/usr/bin
        mkdir -p build_deb/csqca-udata_1.0_amd64/usr/share/applications
        mkdir -p build_deb/csqca-udata_1.0_amd64/usr/share/pixmaps

        cat <<EOF > build_deb/csqca-udata_1.0_amd64/DEBIAN/control
        Package: csqca-udata
        Version: 1.0
        Architecture: amd64
        Maintainer: Laboratorio U.Data <contato@udata.com>
        Description: csQCA U.Data - Analise Qualitativa Comparativa
         Geracao de Tabelas Verdade, Venn e minimizacao booleana.
        EOF

        cat <<EOF > build_deb/csqca-udata_1.0_amd64/usr/share/applications/csqca-udata.desktop
        [Desktop Entry]
        Name=csQCA U.Data
        Comment=Analise csQCA
        Exec=/usr/bin/csqca-udata
        Icon=csqca-udata
        Terminal=false
        Type=Application
        Categories=Science;Education;
        EOF

        # Tratamento do ícone
        convert "1000068048.ico[0]" -resize 64x64 csqca-udata.png || convert "1000068048.ico" -resize 64x64 csqca-udata.png
        if [ -f csqca-udata-0.png ]; then mv csqca-udata-0.png csqca-udata.png; fi
        cp csqca-udata.png build_deb/csqca-udata_1.0_amd64/usr/share/pixmaps/ || true
        
        cp dist/csqca-udata build_deb/csqca-udata_1.0_amd64/usr/bin/
        chmod +x build_deb/csqca-udata_1.0_amd64/usr/bin/csqca-udata
        
        cd build_deb
        dpkg-deb --build csqca-udata_1.0_amd64
    - name: Disponibilizar Instalador Linux
      uses: actions/upload-artifact@v4
      with:
        name: csQCA-UData-Linux-DEB
        path: build_deb/csqca-udata_1.0_amd64.deb

  # ==========================================
  # 3. COMPILADOR MACOS (.app / .zip)
  # ==========================================
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Preparar Python
      uses: actions/setup-python@v5 # Atualizado para v5
      with:
        python-version: '3.10'
    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install pandas matplotlib matplotlib-venn openpyxl pyinstaller sympy
    - name: Compilar com PyInstaller (macOS)
      run: |
        pyinstaller --windowed --noconsole --name "csQCA_UData" --icon=1000068048.ico --add-data "1000068048.ico:." app.py
    - name: Compactar App macOS
      run: |
        cd dist
        zip -r csQCA_UData_macOS.zip csQCA_UData.app/
    - name: Disponibilizar Instalador macOS
      uses: actions/upload-artifact@v4
      with:
        name: csQCA-UData-macOS-ZIP
        path: dist/csQCA_UData_macOS.zip
